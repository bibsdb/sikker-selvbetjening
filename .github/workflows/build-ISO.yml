name: Build Silverblue Bootc Installer ISO

on:
  workflow_dispatch:

jobs:
  iso:
    runs-on: ubuntu-24.04

    container:
      image: fedora:42

    steps:
      - name: Install tools
        run: |
          dnf -y install lorax xorriso curl

      - name: Download Fedora installer ISO
        run: |
          curl -L -o fedora.iso \
          https://download.fedoraproject.org/pub/fedora/linux/releases/42/Workstation/x86_64/iso/Fedora-Workstation-Live-x86_64-42-1.1.iso

      - name: Create Kickstart (bootc correct form)
        run: |
          cat > library.ks << 'EOF'
          lang en_US.UTF-8
          keyboard us
          timezone Europe/Copenhagen --utc
          reboot
          clearpart --all --initlabel
          autopart

          # THIS is the important part
          ostreecontainer --url=ghcr.io/bibsdb/sikker-selvbetjening:latest

          %post
          echo "Bootc image installed"
          %end
          EOF

      - name: Build installer ISO
        run: |
          mkdir -p output
          mkksiso library.ks fedora.iso output/sikker-selvbetjening-installer.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: installer-iso
          path: output/sikker-selvbetjening-installer.iso
