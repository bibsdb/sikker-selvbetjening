name: Build Installer ISO

on:
  workflow_dispatch:

jobs:
  iso:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y podman xorriso

      - name: Pull your image
        run: |
          podman pull ghcr.io/bibsdb/sikker-selvbetjening:latest

      - name: Create output
        run: |
          mkdir output
          echo "ISO build placeholder for ghcr.io/bibsdb/sikker-selvbetjening:latest" > output/README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-iso
          path: output/
