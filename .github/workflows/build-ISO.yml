name: Build Silverblue Installer ISO

on:
  workflow_dispatch:

jobs:
  iso:
    runs-on: ubuntu-24.04

    container:
      image: fedora:42

    steps:
      - name: Install tools
        run: |
          dnf -y install lorax xorriso curl coreutils

      - name: Download OFFICIAL Fedora ISO
        run: |
          curl -L -o fedora.iso \
          https://download.fedoraproject.org/pub/fedora/linux/releases/42/Workstation/x86_64/iso/Fedora-Workstation-Live-x86_64-42-1.1.iso

      - name: Create Kickstart
        run: |
          cat > library.ks << 'EOF'
          lang en_US.UTF-8
          keyboard us
          timezone Europe/Copenhagen --utc
          reboot

          # Install your bootc image (correct method for Silverblue/bootc)
          ostreecontainer --url=ghcr.io/bibsdb/sikker-selvbetjening:latest

          clearpart --all --initlabel
          autopart

          %post
          echo "Installed Sikker Selvbetjening image"
          %end
          EOF

      - name: Inject Kickstart INTO ISO (DO NOT rebuild ISO manually)
        run: |
          mkdir -p output
          mkksiso library.ks fedora.iso output/sikker-selvbetjening-installer.iso

      - name: Verify ISO is bootable (basic check)
        run: |
          file output/sikker-selvbetjening-installer.iso
          ls -lh output/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: installer-iso
          path: output/sikker-selvbetjening-installer.iso
