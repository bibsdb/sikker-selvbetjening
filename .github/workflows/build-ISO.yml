name: Build ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          uname -a
          df -h

      - name: Create test ISO file
        run: |
          mkdir output
          echo "Library installer build successful" > output/README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-build
          path: output/
