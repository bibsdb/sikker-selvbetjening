name: Build Silverblue Installer ISO

on:
  workflow_dispatch:

jobs:
  iso:
    runs-on: ubuntu-24.04

    container:
      image: fedora:42

    steps:
      - name: Install dependencies
        run: |
          dnf -y install curl lorax xorriso

      - name: Download Fedora installer ISO
        run: |
          curl -L -o fedora.iso \
          https://download.fedoraproject.org/pub/fedora/linux/releases/42/Workstation/x86_64/iso/Fedora-Workstation-Live-x86_64-42-1.1.iso

      - name: Create kickstart file
        run: |
          cat > library.ks << 'EOF'
          lang en_US.UTF-8
          keyboard us
          timezone Europe/Copenhagen --utc
          reboot

          %post --erroronfail
          bootc install to-disk \
            --wipe \
            --source-imgref ghcr.io/bibsdb/sikker-selvbetjening:latest \
            /dev/sda
          %end
          EOF

      - name: Build custom installer ISO
        run: |
          mkdir -p output
          mkksiso library.ks fedora.iso output/sikker-selvbetjening-installer.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: silverblue-installer
          path: output/sikker-selvbetjening-installer.iso
